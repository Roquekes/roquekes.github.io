<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cambiaremos el mundo empezando por las cortinas</title>
<style>
  body {
    background: #ffffff;
    margin: 0;
    display: flex;
    min-height: 100vh;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: Arial, sans-serif;
  }
  #container {
    position: relative;
    touch-action: none;
    width: 100vw;
    height: 100vh;
  }
  canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100% !important;
    height: 100% !important;
  }
</style>
</head>
<body>
<div id="container"></div>

<script>
// ============================================================
//  ✏️  TEXTOS PERSONALIZADOS
// ============================================================
const CURTAIN_TEXT = `Hace unos meses acompañé a Sabela a una tienda de telas al peso. Sus cortinas ya eran más parches que cortinas y el apaño con trece pinzas que hice en uno de los agujeros no servía de gran cosa más allá del particular interés estético. Ella quería hacer unas nuevas. Desde que le conozco ha ido cuidando y moldeando su casa en medida de sus posibilidades. Haciéndola hogar. Cualquier persona que va lo nota. Sin que ella haga nada, que lo hace, el espacio te arropa y te da la bienvenida. Una tela a cuadros verde oscuro es la escogida. Encaja con los tonos terrosos que invaden la casa como las plantas que pueblan cada esquina. Como los distintos muebles de madera con barniz oscuro; algunos heredados, otros encontrados, otros construidos. Me sigue pasando el quedarme mirando. Los cuadros, lámparas, libros, discos los “trinkets”; Algunos heredados, otros encontrados, otros construidos. Me sigo quedando mirando porque para mi son gestos de cuidado y de cariño a los que no termino de acostumbrarme. Me dan esperanza y envidia. Cómo arreglar hasta que toca dejar ir. Que bonito y que triste. Pienso en las cosas de este lugar que con el tiempo he aceptado como propias que nunca pensé que serían parte de mi. Fuera sale el sol. Abro las cortinas.
`;

const BG_TL = `En casa de mi madre, donde me crié, todo eran ventanas. Hace tiempo ya que la humedad se comió las cortinas. Ahora el sol tiene carta blanca y desgasta el color de los lomos de los libros, de los cuadros y madura la fruta y seca el pan y la piel de mi mamá.`;
const BG_TR = `En mi primer piso no teníamos ventanas (Legalmente no era un piso). Solo una entrada de luz desde las puertas verde oscuro de la terraza. Nunca pensé que se podría echar de menos tener ventanas. Ahí aprendí a la fuerza, junto a mis plantas, que la luz es vida.`;
const BG_BL = `En mi segundo piso teníamos ventanas y vistas al horizonte por un lado y unos tejados llenos de musgo donde veíamos criar a las gaviotas en el otro. En los casi dos años que viví allí no llegamos a colgar unas cortinas en aquellos tubos tan oxidados.`;
const BG_BR = `Donde vivo ahora no hay cortinas. Ni las habrá. Estoy de paso. He tratado de hacer esto un hogar pero es difícil sabiendo que en unos meses ya me habré ido. No puedo pagarlo. Por primera vez tengo mi espacio y viene con mucha más soledad de la que soy capaz de gestionar.`;

const BG_ALPHA = 0.22;
const GAP_PIXELS_RATIO = 0.04;

const CONFIG = {
  gridW: 45,
  gridH: 29,
  fontSizeMult: 1.9,
  mobileMargin: 60,
  gravity: 0.25,
  damping: 0.98,
  iterationsPerFrame: 5,
  compressFactor: 0.02,
  stretchFactor: 1.1,
  mouseSize: 6000,
  mouseStrength: 5,
};

let c, ctx, bgCanvas, bgCtx;
let SIM_W, SIM_H, CELL_W, CELL_H;
// Factor de nitidez para móviles-------------------------------------------------
const dpr = window.devicePixelRatio || 1;

function updateDimensions() {
  const margin = window.innerWidth < 600 ? CONFIG.mobileMargin : 80;
  const availableSize = Math.min(window.innerWidth - margin, window.innerHeight - margin, 550);
  SIM_W = availableSize;
  SIM_H = availableSize;
  CELL_W = SIM_W / (CONFIG.gridW - 1);
  CELL_H = SIM_H / (CONFIG.gridH - 1);
}

class Vec2 {
  constructor(x = 0, y = 0) { this.x = x; this.y = y; }
  reset(x, y) { this.x = x; this.y = y; return this; }
  subtractNew(v) { return new Vec2(this.x - v.x, this.y - v.y); }
  get lengthSquared() { return this.x * this.x + this.y * this.y; }
}

class Particle {
  constructor({ x, y, pinned, char }) {
    this.pos = new Vec2(x, y); this.oldPos = new Vec2(x, y);
    this.velocity = new Vec2(); this.acceleration = new Vec2();
    this.pinned = pinned; this.char = char;
  }
  update(dt) {
    if (this.pinned) { this.acceleration.reset(0,0); return; }
    this.velocity.reset((this.pos.x - this.oldPos.x) * CONFIG.damping, (this.pos.y - this.oldPos.y) * CONFIG.damping);
    this.oldPos.reset(this.pos.x, this.pos.y);
    const dd = dt * dt;
    this.pos.x += this.velocity.x + this.acceleration.x * dd;
    this.pos.y += this.velocity.y + (CONFIG.gravity / dd) * dd + this.acceleration.y * dd;
    this.acceleration.reset(0,0);
  }
}

class Constraint {
  constructor({ p1, p2, length, minF, maxF }) {
    this.p1 = p1; this.p2 = p2; this.length = length;
    this.min = length * minF; this.max = length * maxF;
  }
  solve() {
    const dx = this.p2.pos.x - this.p1.pos.x;
    const dy = this.p2.pos.y - this.p1.pos.y;
    const dist = Math.hypot(dx, dy);
    if (dist === 0) return;
    let target = this.length;
    if (dist < this.min) target = this.min;
    else if (dist > this.max) target = this.max;
    else return;
    const pct = (target - dist) / dist / 2;
    if (!this.p1.pinned) { this.p1.pos.x -= dx * pct; this.p1.pos.y -= dy * pct; }
    if (!this.p2.pinned) { this.p2.pos.x += dx * pct; this.p2.pos.y += dy * pct; }
  }
}

class Input {
  constructor(particles) {
    this.particles = particles;
    this.mouse = new Vec2();
    this.grabbed = null;
    ['pointerdown','pointerup','pointermove'].forEach(ev => document.addEventListener(ev, this[ev].bind(this)));
  }
  getMouse(e) {
    return {
      x: e.clientX - window.innerWidth / 2 + SIM_W / 2,
      y: e.clientY - window.innerHeight / 2 + SIM_H / 2
    };
  }
  pointerdown(e) {
    const m = this.getMouse(e);
    this.mouse.reset(m.x, m.y);
    for (const p of this.particles) {
      if (p.pinned) continue;
      if (this.mouse.subtractNew(p.pos).lengthSquared < (CELL_W * CELL_W * 4)) {
        this.grabbed = p; p._p = p.pinned; p.pinned = true; return;
      }
    }
  }
  pointerup() { if (this.grabbed) { this.grabbed.pinned = this.grabbed._p; this.grabbed = null; } }
  pointermove(e) {
    const m = this.getMouse(e);
    this.mouse.reset(m.x, m.y);
    if (this.grabbed) this.grabbed.pos.reset(m.x, m.y);
    for (const p of this.particles) {
      const d = this.mouse.subtractNew(p.pos);
      const ls = d.lengthSquared;
      if (ls < CONFIG.mouseSize) {
        const s = (Math.max(0, Math.min(1, (CONFIG.mouseSize - ls) / CONFIG.mouseSize))) * CONFIG.mouseStrength / 300;
        const a = Math.atan2(d.y, d.x) - Math.PI;
        p.acceleration.x += Math.cos(a) * s;
        p.acceleration.y += Math.sin(a) * s;
      }
    }
  }
}

function buildWrappedText(text, cols, rows) {
  const result = new Array(cols * rows).fill(' ');
  // Trabajamos con una copia mutable para poder trocar palabras largas
  const words = text.replace(/\s+/g, ' ').trim().split(' ');
  let wi = 0; // índice circular sobre words

  const lines = [];
  while (lines.length < rows) {
    const lineTokens = [];
    let usedChars = 0; // suma de longitudes de tokens en esta línea

    while (true) {
      const w = words[wi % words.length];

      if (w.length >= cols) {
        if (lineTokens.length > 0) break; // cerrar línea antes
        const chunk = w.slice(0, cols - 1) + '-';
        const rest  = w.slice(cols - 1);
        lineTokens.push(chunk);
        usedChars = cols;
        // Reemplazar la palabra por su resto para la próxima iteración
        words.splice(wi % words.length, 1, ...(rest.length ? [rest] : []));
        break;
      }

      const needed = usedChars === 0 ? w.length : usedChars + 1 + w.length;
      if (needed > cols) break; // no cabe: cerrar línea

      lineTokens.push(w);
      usedChars = needed;
      wi++;
      if (usedChars === cols) break; // relleno exacto
    }

    lines.push({ tokens: lineTokens, used: usedChars });
  }

  for (let row = 0; row < lines.length; row++) {
    const { tokens, used } = lines[row];
    if (tokens.length === 0) continue;

    let rowStr;
    if (tokens.length === 1) {
      // Una sola palabra: sin justificación (alinear izquierda)
      rowStr = tokens[0].padEnd(cols, ' ');
    } else {
      const gaps  = tokens.length - 1;
      const spare = cols - used;           // espacio sobrante a repartir
      const base  = Math.floor(spare / gaps) + 1; // espacio mínimo entre palabras
      const extra = spare % gaps;          // primeros `extra` huecos llevan +1 espacio

      rowStr = '';
      for (let ti = 0; ti < tokens.length; ti++) {
        rowStr += tokens[ti];
        if (ti < gaps) rowStr += ' '.repeat(base + (ti < extra ? 1 : 0));
      }
    }

    for (let col = 0; col < cols; col++) {
      result[row * cols + col] = rowStr[col] ?? ' ';
    }
  }

  return result;
}

function main() {
  updateDimensions();
  const container = document.getElementById('container');
  container.innerHTML = '';

  const fontSize = Math.floor(CELL_W * CONFIG.fontSizeMult);
  const charSize = Math.ceil(fontSize * 1.5);

  const createCache = (text, color) => {
    const cache = {};
    for (const ch of new Set(text)) {
      if (ch === ' ') continue;
      const o = document.createElement('canvas');
      // Multiplicamos el tamaño interno por el DPR para nitidez
      o.width = o.height = charSize * dpr;
      const x = o.getContext('2d');
      x.scale(dpr, dpr); // Escalamos el contexto
      x.font = `bold ${fontSize}px Arial, sans-serif`;
      x.textAlign = 'center'; x.textBaseline = 'middle';
      x.fillStyle = color;
      x.fillText(ch, charSize / 2, charSize / 2);
      cache[ch] = o;
    }
    return cache;
  };

  const curtainCache = createCache(CURTAIN_TEXT, '#333');
  const bgCache = createCache(BG_TL + BG_TR + BG_BL + BG_BR, '#444');

  bgCanvas = document.createElement('canvas');
  c = document.createElement('canvas');
  [bgCanvas, c].forEach(canv => {
    // Ajuste de resolución física vs visual
    canv.width = window.innerWidth * dpr;
    canv.height = window.innerHeight * dpr;
    container.appendChild(canv);
  });
  
  bgCtx = bgCanvas.getContext('2d');
  ctx = c.getContext('2d');

  bgCtx.scale(dpr, dpr);
  ctx.scale(dpr, dpr);

  const OX = window.innerWidth / 2 - SIM_W / 2;
  const OY = window.innerHeight / 2 - SIM_H / 2;

  const centerX = SIM_W / 2;
  const centerY = SIM_H / 2;
  const gapPx = SIM_W * GAP_PIXELS_RATIO;

  const colsLeft = [], colsRight = [], rowsTop = [], rowsBot = [];
  for (let i = 0; i < CONFIG.gridW; i++) {
    const posX = i * CELL_W;
    if (posX < centerX - gapPx)      colsLeft.push(i);
    else if (posX > centerX + gapPx) colsRight.push(i);
  }
  for (let j = 0; j < CONFIG.gridH; j++) {
    const posY = j * CELL_H;
    if (posY < centerY - gapPx)      rowsTop.push(j);
    else if (posY > centerY + gapPx) rowsBot.push(j);
  }

  // Texto justificado para cada cuadrante
  const bgQuadrants = {
    tl: buildWrappedText(BG_TL, colsLeft.length,  rowsTop.length),
    tr: buildWrappedText(BG_TR, colsRight.length, rowsTop.length),
    bl: buildWrappedText(BG_BL, colsLeft.length,  rowsBot.length),
    br: buildWrappedText(BG_BR, colsRight.length, rowsBot.length),
  };

  bgCtx.globalAlpha = BG_ALPHA;
  for (let j = 0; j < CONFIG.gridH; j++) {
    const posY = j * CELL_H;
    if (Math.abs(posY - centerY) < gapPx) continue;
    const isTop = posY < centerY;
    const rowArr = isTop ? rowsTop : rowsBot;
    const localRow = rowArr.indexOf(j);
    if (localRow === -1) continue;

    for (let i = 0; i < CONFIG.gridW; i++) {
      const posX = i * CELL_W;
      if (Math.abs(posX - centerX) < gapPx) continue;
      const isLeft = posX < centerX;
      const colArr = isLeft ? colsLeft : colsRight;
      const localCol = colArr.indexOf(i);
      if (localCol === -1) continue;

      const key = (isTop ? 't' : 'b') + (isLeft ? 'l' : 'r');
      const qCols = isLeft ? colsLeft.length : colsRight.length;
      const ch = bgQuadrants[key][localRow * qCols + localCol];

      if (ch && ch !== ' ' && bgCache[ch]) {
        bgCtx.drawImage(bgCache[ch], OX + posX - charSize/2, OY + posY - charSize/2, charSize, charSize);
      }
    }
  }

  const wrappedChars = buildWrappedText(CURTAIN_TEXT, CONFIG.gridW, CONFIG.gridH);

  const particles = [];
  const constraints = [];
  for (let j = 0; j < CONFIG.gridH; j++) {
    for (let i = 0; i < CONFIG.gridW; i++) {
      const p = new Particle({
        x: i * CELL_W, y: j * CELL_H,
        pinned: j === 0,
        char: wrappedChars[j * CONFIG.gridW + i] || ' '
      });
      particles.push(p);
      if (j > 0) {
        const up = particles[(j-1) * CONFIG.gridW + i];
        const con = new Constraint({ p1: up, p2: p, length: CELL_H, minF: CONFIG.compressFactor, maxF: CONFIG.stretchFactor });
        constraints.push(con);
        up.downCon = con;
      }
      if (i > 0) constraints.push(new Constraint({ p1: particles[j * CONFIG.gridW + (i-1)], p2: p, length: CELL_W, minF: 0.6, maxF: 4 }));
    }
  }

  new Input(particles);

  let last = 0;
  function loop(now) {
    const dt = Math.min(now - last, 32) || 16;
    last = now;
    // Limpiamos usando las coordenadas lógicas (el scale se encarga del resto)
    ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
    particles.forEach(p => p.update(dt/16));
    for (let i = 0; i < CONFIG.iterationsPerFrame; i++) constraints.forEach(con => con.solve());
    
    particles.forEach(p => {
      if (p.char === ' ' || !curtainCache[p.char]) return;
      let cos = 1, sin = 0;
      if (p.downCon) {
        const dx = p.downCon.p2.pos.x - p.downCon.p1.pos.x;
        const dy = p.downCon.p2.pos.y - p.downCon.p1.pos.y;
        const a = Math.atan2(dy, dx) - Math.PI / 2;
        cos = Math.cos(a); sin = Math.sin(a);
      }
      ctx.setTransform(cos * dpr, sin * dpr, -sin * dpr, cos * dpr, (p.pos.x + OX) * dpr, (p.pos.y + OY) * dpr);
      ctx.drawImage(curtainCache[p.char], -charSize/2, -charSize/2, charSize, charSize);
    });
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
}

setTimeout(main, 500);
window.addEventListener('resize', () => location.reload());
</script>
</body>
</html>
